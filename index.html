<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serverless Notes V2</title>
  <link rel="stylesheet" href="/files/style.css">
</head>
<body>

  <header>
    <h1>Serverless Notes</h1>
    <div>
      <button id="loginBtn">Login</button>
      <button id="logoutBtn" style="display:none">Logout</button>
    </div>
  </header>

  <main>

    <section id="landingSection" class="landing">
      <div class="landing-content">
        <h2>Simple. Secure. Serverless Notes.</h2>
        <p>Store your notes in the cloud with a fast serverless architecture.</p>
        <button id="landingLoginBtn">Sign up / Log in</button>
      </div>
    </section>

    <section id="foldersSection" style="display:none">

      <div class="add-note-card">
        <h2>Create Folder</h2>
        <form id="addFolderForm">
          <input type="text" id="folderName" placeholder="Folder Name" required>
          <button type="submit">Create Folder</button>
        </form>
      </div>

      <h2>Your Folders</h2>
      <div id="foldersList" class="notes-grid"></div>

    </section>

    <section id="notesSection" style="display:none">

      <button id="backBtn">← Back to Folders</button>

      <div class="add-note-card">
        <h2>Add Note</h2>

        <form id="addNoteForm">
          <input type="text" id="noteTitle" placeholder="Title" required>
          <textarea id="noteContent" placeholder="Content" required></textarea>
          <button type="submit">Add Note</button>
        </form>

      </div>

      <h2>Your Notes</h2>
      <div id="notesList" class="notes-grid"></div>

    </section>

  </main>

  <script src="/files/script.js"></script>
</body>
</html>

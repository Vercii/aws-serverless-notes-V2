<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serverless Notes V2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Serverless Notes</h1>
  <button id="logoutBtn">Logout</button>
</header>

<main class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Folders</h2>

    <form id="addFolderForm">
      <input type="text" id="folderName" placeholder="New folder..." required>
    </form>

    <div id="foldersList"></div>
  </aside>

  <!-- MAIN CONTENT -->
  <section class="content">

    <h2 id="currentFolderName">Select a folder</h2>

    <form id="addNoteForm">
      <input type="text" id="noteTitle" placeholder="Title" required>
      <textarea id="noteContent" placeholder="Write your note..." required></textarea>
      <button type="submit">Add Note</button>
    </form>

    <div id="notesList"></div>

  </section>

</main>

<script src="script.js"></script>
</body>
</html>
